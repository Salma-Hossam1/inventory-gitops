apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'inventory-app'
        static_configs:
          - targets: ['app-service.inventory-prod.svc.cluster.local:3000']

      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres-service.inventory-prod.svc.cluster.local:5432']

      - job_name: 'redis'
        static_configs:
          - targets: ['redis-service.inventory-prod.svc.cluster.local:6379']