apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: inventory-app
  name: inventory-app
  namespace: inventory-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-app
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "3000"
        prometheus.io/scrape: "true"
      labels:
        app: inventory-app
    spec:
      automountServiceAccountToken: false
      containers:
      - env:
        - name: START_MODE
          value: api
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_USER
              name: postgres-secret
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PASSWORD
              name: postgres-secret
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              key: POSTGRES_DB
              name: postgres-secret
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              key: JWT_SECRET
              name: app-secret
        - name: EMAIL_USER
          valueFrom:
            secretKeyRef:
              key: EMAIL_USER
              name: app-secret
        - name: EMAIL_PASS
          valueFrom:
            secretKeyRef:
              key: EMAIL_PASS
              name: app-secret
        envFrom:
        - configMapRef:
            name: app-config
        image: salmahossam12/inventory-app:initial
        imagePullPolicy: Always
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /api/v1/health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 20
          successThreshold: 1
          timeoutSeconds: 1
        name: inventory-app
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /api/v1/health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
        startupProbe:
          failureThreshold: 12
          httpGet:
            path: /api/v1/health
            port: 3000
            scheme: HTTP
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /app/uploads
          name: uploads
      dnsPolicy: ClusterFirst
      initContainers:
      - command:
        - sh
        - -c
        - |
          for i in $(seq 1 30); do
            nc -z postgres 5432 && echo "postgres is up" && exit 0
            echo "waiting for postgres..."
            sleep 2
          done
          echo "postgres not reachable" && exit 1
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        name: wait-for-postgres
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      - command:
        - sh
        - -c
        - |
          for i in $(seq 1 30); do
            nc -z redis 6379 && echo "redis is up" && exit 0
            echo "waiting for redis..."
            sleep 2
          done
          echo "redis not reachable" && exit 1
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        name: wait-for-redis
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 1001
        runAsGroup: 1001
        runAsNonRoot: true
        runAsUser: 1001
      serviceAccountName: inventory-app-sa
      terminationGracePeriodSeconds: 30
      volumes:
      - emptyDir: {}
        name: uploads

