apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: inventory-prod
spec:
  accessModes:
    - ReadWriteOnce        # only one pod mounts this at a time — correct for postgres
  resources:
    requests:
      storage: 512Mi
  storageClassName: standard   # change to "gp2" on AWS EKS, "premium-rrs" on GKE