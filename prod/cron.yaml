apiVersion: batch/v1
kind: CronJob
metadata:
  name: inventory-cron
  namespace: inventory-prod
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 10
  jobTemplate:
    metadata: {}
    spec:
      backoffLimit: 2
      template:
        metadata: {}
        spec:
          containers:
            - command:
                - node
                - dist/main.js
              env:
                - name: START_MODE
                  value: scheduler
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      key: POSTGRES_PASSWORD
                      name: postgres-secret
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      key: POSTGRES_USER
                      name: postgres-secret
              envFrom:
                - configMapRef:
                    name: app-config
              image: salmahossam12/inventory-app:initial
              imagePullPolicy: IfNotPresent
              name: stock-report
              resources:
                limits:
                  cpu: 300m
                  memory: 256Mi
                requests:
                  cpu: 100m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
              volumeMounts:
                - mountPath: /app/uploads
                  name: uploads
          dnsPolicy: ClusterFirst
          initContainers:
            - command:
                - sh
                - -c
                - |
                  for i in $(seq 1 30); do
                    nc -z postgres 5432 && echo "postgres is up" && exit 0
                    sleep 2
                  done
                  echo "postgres not reachable" && exit 1
              image: busybox:1.36
              imagePullPolicy: IfNotPresent
              name: wait-for-postgres
              resources: {}
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
          restartPolicy: OnFailure
          schedulerName: default-scheduler
          securityContext:
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
          serviceAccountName: inventory-app-sa
          terminationGracePeriodSeconds: 30
          volumes:
            - emptyDir: {}
              name: uploads
  schedule: "* * * * *"
  startingDeadlineSeconds: 60
  successfulJobsHistoryLimit: 10
  suspend: false
