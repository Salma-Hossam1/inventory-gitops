apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-worker
  namespace: inventory-prod
spec:
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: inventory-worker
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: inventory-worker
    spec:
      containers:
        - command:
            - node
            - dist/main.js
          env:
            - name: START_MODE
              value: worker
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  key: POSTGRES_USER
                  name: postgres-secret
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: POSTGRES_PASSWORD
                  name: postgres-secret
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  key: POSTGRES_DB
                  name: postgres-secret
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  key: JWT_SECRET
                  name: app-secret
          envFrom:
            - configMapRef:
                name: app-config
          image: salmahossam12/inventory-app:latest
          imagePullPolicy: Always
          name: inventory-worker
          resources:
            limits:
              cpu: 300m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /app/uploads
              name: uploads
      dnsPolicy: ClusterFirst
      initContainers:
        - command:
            - sh
            - -c
            - |
              for i in $(seq 1 30); do
                nc -z redis 6379 && echo "redis is up" && exit 0
                sleep 2
              done
              echo "redis not reachable" && exit 1
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          name: wait-for-redis
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
        - command:
            - sh
            - -c
            - |
              for i in $(seq 1 30); do
                nc -z postgres 5432 && echo "postgres is up" && exit 0
                sleep 2
              done
              echo "postgres not reachable" && exit 1
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          name: wait-for-postgres
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 1001
        runAsGroup: 1001
        runAsNonRoot: true
        runAsUser: 1001
      serviceAccountName: inventory-app-sa
      terminationGracePeriodSeconds: 30
      volumes:
        - emptyDir: {}
          name: uploads
